services:
  signal-api:
    image: bbernhard/signal-cli-rest-api:0.100-rootless
    restart: unless-stopped
    container_name: signal-api
    environment:
      MODE: json-rpc
      LOG_LEVEL: warn
      JSON_RPC_IGNORE_ATTACHMENTS: "true"
      JSON_RPC_IGNORE_STORIES: "true"
      JSON_RPC_IGNORE_AVATARS: "true"
      JSON_RPC_IGNORE_STICKERS: "true"
    expose:
      - "8080"
    volumes:
      - signal-cli-data:/home/.local/share/signal-cli
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "2"
    networks:
      - backplane
      - signal-egress
    mem_limit: 512m
    cpus: "1"

  dashboard:
    build:
      context: ./api-signal
    restart: unless-stopped
    container_name: signal-dashboard
    env_file:
      - ./.env
    environment:
      SIGNAL_API_URL: http://signal-api:8080
      SIGNAL_GROUPS_FILE: /config/groups.json
      SIGNAL_STATE_FILE: /data/state.json
      SIGNAL_STATE_SECRET_FILE: /data/state.secret
      SIGNAL_LOCK_FILE: /data/sender.lock
      SIGNAL_WEB_PASSWORD: "${SIGNAL_WEB_PASSWORD:-1111}"
    entrypoint:
      - signal-web
    depends_on:
      - signal-api
    ports:
      - "127.0.0.1:8788:8787"
    volumes:
      - ./groups.json:/config/groups.json:ro
      - broadcaster-data:/data
    networks:
      - backplane
      - dashboard-host
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    mem_limit: 256m
    cpus: "0.5"

  cloudflare-tunnel:
    image: cloudflare/cloudflared:2025.1.0
    restart: unless-stopped
    container_name: signal-tunnel
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: "${CLOUDFLARE_TUNNEL_TOKEN}"
    depends_on:
      - dashboard
    networks:
      - dashboard-host
    profiles:
      - cloudflare
    logging:
      driver: json-file
      options:
        max-size: "2m"
        max-file: "1"
    mem_limit: 128m
    cpus: "0.25"
    healthcheck:
      test: ["CMD", "curl", "-sf", "https://www.cloudflare.com"]
      interval: 30s
      timeout: 5s
      retries: 2
      start_period: 10s

  cloudflare-quick-tunnel:
    image: cloudflare/cloudflared:2025.1.0
    restart: unless-stopped
    container_name: signal-quick-tunnel
    command: tunnel --no-autoupdate --url http://signal-dashboard:8787
    depends_on:
      - dashboard
    networks:
      - dashboard-host
    profiles:
      - cloudflare-quick
    logging:
      driver: json-file
      options:
        max-size: "2m"
        max-file: "1"
    mem_limit: 128m
    cpus: "0.25"

  tunnel-url-reporter:
    image: alpine:3.19
    container_name: signal-tunnel-url
    restart: "no"
    depends_on:
      - cloudflare-quick-tunnel
    networks:
      - dashboard-host
    profiles:
      - cloudflare-quick
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo '============================================================'
        echo ' Waiting for Cloudflare Quick Tunnel URL...'
        echo '============================================================'
        sleep 6
        i=0
        while [ $$i -lt 30 ]; do
          URL=$$(wget -qO- http://cloudflared:20241/metrics 2>/dev/null | grep -o 'https://[a-zA-Z0-9_-]*\.trycloudflare\.com' | head -1)
          if [ -n "$$URL" ]; then
            echo ''
            echo '============================================================'
            echo ' [OK] Cloudflare Quick Domain Ready!'
            echo '============================================================'
            echo ''
            echo "  Public URL : $$URL"
            echo '  Local URL  : http://127.0.0.1:8788'
            echo "  Password   : $${SIGNAL_WEB_PASSWORD:-1111}"
            echo ''
            echo '============================================================'
            exit 0
          fi
          i=$$(($$i+1))
          sleep 3
        done
        echo '[!] Tunnel URL not detected. Run: docker logs signal-quick-tunnel'
    mem_limit: 32m
    cpus: "0.1"
    logging:
      driver: json-file
      options:
        max-size: "1m"
        max-file: "1"

  signal-linker:
    build:
      context: .
      dockerfile: Dockerfile.signal-linker
      args:
        PYTHON_VERSION: "3.11"
    restart: "no"
    container_name: signal-linker
    environment:
      SIGNAL_API_URL: http://signal-api:8080
      SIGNAL_DASHBOARD_URL: http://signal-dashboard:8787
      SIGNAL_DASHBOARD_PASSWORD: "${SIGNAL_WEB_PASSWORD:-1111}"
      SIGNAL_LINK_OUTPUT: /output/signal-link.png
      SIGNAL_LINK_TIMEOUT: "600"
      PYTHONUNBUFFERED: "1"
    depends_on:
      - dashboard
    volumes:
      - ./api-signal/outputs:/output
    networks:
      - backplane
      - dashboard-host
    profiles:
      - link
    stdin_open: true
    tty: true
    logging:
      driver: json-file
      options:
        max-size: "1m"
    mem_limit: 128m
    cpus: "0.5"

  reminder-scheduler:
    build:
      context: .
      dockerfile: Dockerfile.reminder
      args:
        PYTHON_VERSION: "3.11"
    restart: unless-stopped
    container_name: reminder-scheduler
    environment:
      SIGNAL_API_URL: http://signal-api:8080
      SIGNAL_WEB_PASSWORD: "${SIGNAL_WEB_PASSWORD:-1111}"
      SIGNAL_DASHBOARD_URL: http://dashboard:8787
      TELEGRAM_SESSION_DIR: /sessions
      CONFIG_FILE: /config/reminder_config.json
      PYTHONUNBUFFERED: "1"
    depends_on:
      - signal-api
      - dashboard
    volumes:
      - ./reminder_config.json:/config/reminder_config.json:ro
      - ./message.txt:/config/message.txt:ro
      - ./blacklist.json:/data/blacklist.json
      - C:/Users/novra/Desktop/bot_tg:/sessions
    networks:
      - backplane
    profiles:
      - scheduler
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    mem_limit: 256m
    cpus: "0.5"

networks:
  backplane:
    internal: true
    driver: bridge
  dashboard-host:
    driver: bridge
  signal-egress:
    driver: bridge

volumes:
  signal-cli-data:
    driver: local
  broadcaster-data:
    driver: local
