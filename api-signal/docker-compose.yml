services:
  signal-api:
    image: bbernhard/signal-cli-rest-api:0.100-rootless
    restart: unless-stopped
    environment:
      MODE: json-rpc
      LOG_LEVEL: warn
      JSON_RPC_IGNORE_ATTACHMENTS: "true"
      JSON_RPC_IGNORE_STORIES: "true"
      JSON_RPC_IGNORE_AVATARS: "true"
      JSON_RPC_IGNORE_STICKERS: "true"
    expose:
      - "8080"
    volumes:
      - signal-cli-data:/home/.local/share/signal-cli
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - backplane
      - signal-egress

  broadcaster:
    profiles:
      - cli
    build:
      context: .
    env_file:
      - .env
    environment:
      SIGNAL_API_URL: http://signal-api:8080
      SIGNAL_GROUPS_FILE: /config/groups.json
      SIGNAL_STATE_FILE: /data/state.json
      SIGNAL_STATE_SECRET_FILE: /data/state.secret
      SIGNAL_LOCK_FILE: /data/sender.lock
    depends_on:
      - signal-api
    volumes:
      - ./groups.json:/config/groups.json:ro
      - broadcaster-data:/data
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 64
    mem_limit: 256m
    cpus: 0.5
    networks:
      - backplane

  dashboard:
    build:
      context: .
    entrypoint:
      - signal-web
    env_file:
      - .env
    environment:
      SIGNAL_API_URL: http://signal-api:8080
      SIGNAL_GROUPS_FILE: /config/groups.json
      SIGNAL_STATE_FILE: /data/state.json
      SIGNAL_STATE_SECRET_FILE: /data/state.secret
      SIGNAL_LOCK_FILE: /data/sender.lock
      SIGNAL_WEB_PASSWORD: ${SIGNAL_WEB_PASSWORD}
    depends_on:
      - signal-api
    ports:
      - "127.0.0.1:8787:8787"
    volumes:
      - ./groups.json:/config/groups.json:ro
      - broadcaster-data:/data
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 64
    mem_limit: 256m
    cpus: 0.5
    networks:
      - backplane
      - dashboard-host

  linker:
    profiles:
      - link
    image: curlimages/curl:8.14.1
    depends_on:
      - signal-api
    entrypoint:
      - curl
    volumes:
      - ./outputs:/output
    networks:
      - backplane
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

networks:
  backplane:
    internal: true
  dashboard-host: {}
  signal-egress: {}

volumes:
  signal-cli-data:
  broadcaster-data:
